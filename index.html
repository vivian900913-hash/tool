<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="今天吃什麼">
<meta name="theme-color" content="#EEF4FF">
<title>今天吃什麼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EEF4FF;
    --surface: #ffffff;
    --surface2: #F0F6FF;
    --border: #D4E4FF;
    --accent: #5B9FFF;
    --accent-dark: #3A7FE8;
    --accent-soft: #DCE9FF;
    --text: #1A2A44;
    --text2: #6B84A8;
    --text3: #A0B4CC;
    --radius: 18px;
    --radius-sm: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
  }
  .header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    padding: env(safe-area-inset-top, 0) 20px 0;
  }
  .header-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0 12px;
  }
  .header h1 { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .count-badge {
    background: var(--accent-soft); color: var(--accent-dark);
    font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px;
  }
  .tabs { display: flex; gap: 6px; padding: 0 0 14px; }
  .tab {
    flex: 1; padding: 9px; text-align: center; font-size: 13px; font-weight: 500;
    border-radius: 40px; cursor: pointer; color: var(--text2);
    transition: all 0.2s; border: none; background: none; font-family: inherit;
  }
  .tab.active { background: var(--accent); color: #fff; }
  .page { display: none; padding: 16px 20px; padding-bottom: calc(env(safe-area-inset-bottom, 0) + 24px); }
  .page.active { display: block; }
  .pick-hero { text-align: center; padding: 28px 0 24px; }
  .pick-hero .question { font-size: 26px; font-weight: 700; line-height: 1.3; color: var(--text); margin-bottom: 6px; }
  .pick-hero .hint { font-size: 14px; color: var(--text2); }
  .pick-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 18px;
    background: var(--accent); color: #fff;
    font-size: 17px; font-weight: 700;
    border: none; border-radius: var(--radius);
    cursor: pointer; font-family: inherit;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(91,159,255,0.35);
    margin-bottom: 16px;
  }
  .pick-btn:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(91,159,255,0.2); }
  .result-card {
    background: var(--surface); border-radius: var(--radius);
    border: 1.5px solid var(--border); overflow: hidden;
    display: none; animation: slideUp 0.35s cubic-bezier(.2,.8,.4,1);
  }
  .result-card.show { display: block; }
  @keyframes slideUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  .result-label {
    background: linear-gradient(90deg, #B8D5FF, #FFCCE0);
    padding: 9px 16px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; color: var(--accent-dark);
  }
  .result-body { padding: 20px; }

  .result-name {
    font-size: 26px; font-weight: 700; line-height: 1.2;
    margin-bottom: 16px; color: var(--text); letter-spacing: -0.4px;
  }
  .result-actions { display: flex; gap: 8px; }
  .btn-map {
    flex: 1; padding: 12px;
    background: var(--surface2); color: var(--text);
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500; font-family: inherit;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-map.primary { background: var(--accent); color: #fff; border-color: transparent; }
  .btn-map:active { opacity: 0.75; }
  .btn-reroll {
    padding: 12px 16px; background: var(--surface2); color: var(--text2);
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; font-family: inherit; cursor: pointer;
    transition: opacity 0.15s; white-space: nowrap;
  }
  .btn-reroll:active { opacity: 0.75; }
  .empty-pick { text-align: center; padding: 48px 20px; }
  .empty-pick .icon { font-size: 52px; margin-bottom: 14px; }
  .empty-pick p { font-size: 15px; line-height: 1.7; color: var(--text2); }
  .section-title {
    font-size: 12px; font-weight: 700; color: var(--text3);
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px;
  }
  .add-form {
    background: var(--surface); border-radius: var(--radius);
    border: 1.5px solid var(--border); padding: 16px; margin-bottom: 24px;
  }
  .form-row { margin-bottom: 12px; }
  .form-row:last-child { margin-bottom: 0; }
  .form-row label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
  .form-input {
    width: 100%; background: var(--surface2);
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px 14px; font-size: 15px; color: var(--text);
    font-family: inherit; outline: none; -webkit-appearance: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text3); }

  .submit-btn {
    width: 100%; padding: 13px; background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 700; font-family: inherit;
    cursor: pointer; transition: opacity 0.15s;
    box-shadow: 0 3px 10px rgba(91,159,255,0.3);
  }
  .submit-btn:active { opacity: 0.85; }
  .places-list { display: flex; flex-direction: column; gap: 8px; }
  .place-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border-radius: var(--radius-sm);
    padding: 14px; border: 1.5px solid var(--border);
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

  .place-info { flex: 1; min-width: 0; }
  .place-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .place-meta { font-size: 12px; color: var(--accent); margin-top: 2px; }
  .place-del {
    background: none; border: none; color: var(--text3); font-size: 16px;
    cursor: pointer; padding: 6px 8px; border-radius: 8px;
    transition: background 0.15s, color 0.15s; flex-shrink: 0;
  }
  .place-del:active { background: #FFE4EA; color: #E0708A; }
  .empty-list {
    text-align: center; padding: 32px 20px; color: var(--text3);
    font-size: 14px; line-height: 1.8;
    background: var(--surface); border-radius: var(--radius);
    border: 1.5px dashed var(--border);
  }
  .toast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0) + 28px);
    left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--text); color: #fff;
    padding: 10px 20px; border-radius: 40px;
    font-size: 13px; font-weight: 500;
    pointer-events: none;
    transition: transform 0.3s cubic-bezier(.2,.8,.4,1), opacity 0.3s;
    opacity: 0; white-space: nowrap; z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  @keyframes popIn {
    0% { transform: scale(0.7); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop { animation: popIn 0.4s cubic-bezier(.2,.8,.4,1); }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>🍽 今天吃什麼</h1>
    <span class="count-badge" id="countBadge">0 家</span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('pick', this)">隨機抽籤</button>
    <button class="tab" onclick="switchTab('list', this)">管理店家</button>
  </div>
</div>

<div class="page active" id="page-pick">
  <div id="pickContent">
    <div class="pick-hero">
      <div class="question">肚子餓了嗎？🍴</div>
      <div class="hint">讓命運決定今天的選擇</div>
    </div>
    <button class="pick-btn" onclick="pickOne()">
      <span>🎲</span> 幫我決定！
    </button>
    <div class="result-card" id="resultCard">
      <div class="result-label">✦ 今天就吃這家</div>
      <div class="result-body">
        <div class="result-name" id="resultName"></div>
        <div class="result-actions" id="resultActions"></div>
      </div>
    </div>
  </div>
  <div class="empty-pick" id="emptyPick" style="display:none">
    <div class="icon">🍽</div>
    <p>先去「管理店家」<br>加幾家你喜歡的餐廳吧！</p>
  </div>
</div>

<div class="page" id="page-list">
  <p class="section-title">新增店家</p>
  <div class="add-form">
    <div class="form-row">
      <label>店名</label>
      <input class="form-input" id="nameInput" type="text" placeholder="例：阿輝炒飯" />
    </div>
    <div class="form-row">
      <label>Google Maps 連結（選填）</label>
      <input class="form-input" id="mapInput" type="url" placeholder="貼上地圖分享連結" />
    </div>
    <div class="form-row">
      <button class="submit-btn" onclick="addPlace()">＋ 新增店家</button>
    </div>
  </div>
  <p class="section-title">我的清單</p>
  <div class="places-list" id="placesList"></div>
  <div class="empty-list" id="emptyList" style="display:none">還沒有店家<br>快加幾家你喜歡的吧 🙂</div>
</div>

<div class="toast" id="toast"></div>

<script>
let places = JSON.parse(localStorage.getItem('lunchPlaces3') || '[]');

function save() { localStorage.setItem('lunchPlaces3', JSON.stringify(places)); updateCount(); }
function updateCount() { document.getElementById('countBadge').textContent = places.length + ' 家'; }

function renderList() {
  const list = document.getElementById('placesList');
  const empty = document.getElementById('emptyList');
  list.innerHTML = '';
  if (places.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  places.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'place-item';
    div.innerHTML =
      '<div class="place-info">' +
        '<div class="place-name">' + p.name + '</div>' +
        (p.url ? '<div class="place-meta">📍 有地圖連結</div>' : '') +
      '</div>' +
      '<button class="place-del" onclick="removePlace(' + i + ')">✕</button>';
    list.appendChild(div);
  });
}

function addPlace() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showToast('請輸入店名'); return; }
  const url = document.getElementById('mapInput').value.trim();
  places.push({ name, url });
  document.getElementById('nameInput').value = '';
  document.getElementById('mapInput').value = '';
  save(); renderList();
  showToast('✓ ' + name + ' 已加入');
}

function removePlace(i) {
  const name = places[i].name;
  places.splice(i, 1);
  save(); renderList();
  showToast(name + ' 已刪除');
  document.getElementById('resultCard').classList.remove('show');
}

function pickOne() {
  if (places.length === 0) return;
  const idx = Math.floor(Math.random() * places.length);
  const p = places[idx];
  const card = document.getElementById('resultCard');
  document.getElementById('resultName').textContent = p.name;
  let html = '<button class="btn-reroll" onclick="pickOne()">再抽一次</button>';
  if (p.url) {
    const safeUrl = p.url.replace(/'/g, "\\'");
    html = '<button class="btn-map primary" onclick="openMap(\'' + safeUrl + '\')">📍 開啟地圖</button>' + html;
  }
  document.getElementById('resultActions').innerHTML = html;
  card.classList.remove('show');
  void card.offsetWidth;
  card.classList.add('show');
}

function openMap(url) { window.open(url, '_blank'); }

function switchTab(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  btn.classList.add('active');
  if (page === 'pick') checkEmpty();
}

function checkEmpty() {
  const empty = document.getElementById('emptyPick');
  const content = document.getElementById('pickContent');
  if (places.length === 0) { empty.style.display = 'block'; content.style.display = 'none'; }
  else { empty.style.display = 'none'; content.style.display = 'block'; }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('mapInput').focus();
});

renderList();
updateCount();
checkEmpty();
</script>
</body>
</html>
